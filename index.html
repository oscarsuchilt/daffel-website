<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daffel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif}

body{
background:#ffffff;
color:#111;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
text-align:center;
max-width:600px;
padding:40px;
}

h1{
font-size:64px;
font-weight:600;
letter-spacing:-1px;
margin-bottom:10px;
}

.tagline{
font-size:20px;
color:#6e6e73;
margin-bottom:40px;
}

.countdown{
font-size:28px;
font-weight:500;
letter-spacing:2px;
margin-bottom:40px;
}

.email-box{
display:flex;
justify-content:center;
gap:10px;
}

input{
padding:14px 16px;
font-size:16px;
border:1px solid #d2d2d7;
border-radius:12px;
width:260px;
outline:none;
}

button{
padding:14px 20px;
font-size:16px;
border:none;
border-radius:12px;
background:#000;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
opacity:0.85;
}

footer{
margin-top:40px;
font-size:13px;
color:#8e8e93;
}
</style>

</head>
<body>

<div class="container">

<h1>Daffel</h1>
<p class="tagline">Hogar y humanos</p>

<div class="countdown" id="timer"></div>

<div class="email-box">
<input type="email" placeholder="Tu correo">
<button>Unirme</button>
</div>

<footer>
Launching soon
</footer>

</div>

<script>
const targetDate = new Date();
targetDate.setMonth(targetDate.getMonth() + 1);

function updateTimer(){
const now = new Date();
const diff = targetDate - now;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/(1000*60))%60);
const seconds = Math.floor((diff/1000)%60);

document.getElementById("timer").innerHTML =
days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}

setInterval(updateTimer,1000);
updateTimer();
</script>

</body>
</html>
