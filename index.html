<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daffel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at 20% 30%, #a5b4fc 0%, transparent 40%),
radial-gradient(circle at 80% 20%, #67e8f9 0%, transparent 40%),
radial-gradient(circle at 70% 80%, #c084fc 0%, transparent 40%),
radial-gradient(circle at 10% 80%, #f9a8d4 0%, transparent 40%),
#ffffff;
color:#111;
}

.container{
text-align:center;
max-width:600px;
padding:60px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(20px);
border-radius:26px;
box-shadow:0 25px 70px rgba(0,0,0,0.08);
}

h1{
font-size:68px;
font-weight:700;
letter-spacing:-1px;
margin-bottom:10px;
background:linear-gradient(90deg,#6366f1,#06b6d4,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
font-size:20px;
color:#6e6e73;
margin-bottom:40px;
}

.countdown{
font-size:28px;
font-weight:600;
letter-spacing:2px;
margin-bottom:40px;
}

.email-box{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

input{
padding:15px 18px;
font-size:16px;
border:1px solid #e5e5e7;
border-radius:14px;
width:260px;
outline:none;
transition:0.2s;
background:white;
}

input:focus{
border-color:#6366f1;
box-shadow:0 0 0 3px rgba(99,102,241,0.15);
}

button{
padding:15px 24px;
font-size:16px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#6366f1,#06b6d4);
color:white;
cursor:pointer;
font-weight:600;
transition:0.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.12);
}

footer{
margin-top:40px;
font-size:13px;
color:#8e8e93;
}

</style>

</head>
<body>

<div class="container">

<h1>Daffel</h1>
<p class="tagline">Hogar y personas</p>

<div class="countdown" id="timer"></div>

<div class="email-box">
<input type="email" placeholder="Tu correo">
<button>Unirme</button>
</div>

<footer>
Launching soon
</footer>

</div>

<script>

const targetDate = new Date();
targetDate.setMonth(targetDate.getMonth() + 1);

function updateTimer(){
const now = new Date();
const diff = targetDate - now;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/(1000*60))%60);
const seconds = Math.floor((diff/1000)%60);

document.getElementById("timer").innerHTML =
days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}

setInterval(updateTimer,1000);
updateTimer();

</script>

</body>
</html>
